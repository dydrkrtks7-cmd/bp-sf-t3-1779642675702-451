<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="315" cy="405" r="34" fill="#b91c1c" opacity="0.12"/>
    <circle cx="1050" cy="645" r="71" fill="#b91c1c" opacity="0.15"/>
    <circle cx="267" cy="-76" r="36" fill="#b91c1c" opacity="0.11"/>
    <circle cx="138" cy="475" r="80" fill="#b91c1c" opacity="0.10"/>
    <circle cx="548" cy="363" r="30" fill="#b91c1c" opacity="0.15"/>
    <circle cx="510" cy="400" r="69" fill="#b91c1c" opacity="0.15"/>
    <rect x="423" y="588" width="53" height="74" rx="8" fill="#dc2626" opacity="0.07" transform="rotate(21, 1034, 244)"/>
    <rect x="1295" y="227" width="83" height="77" rx="8" fill="#dc2626" opacity="0.05" transform="rotate(13, 399, -25)"/>
    <rect x="857" y="600" width="40" height="96" rx="8" fill="#dc2626" opacity="0.05" transform="rotate(19, 852, 429)"/>
    <rect x="101" y="-36" width="39" height="86" rx="8" fill="#dc2626" opacity="0.11" transform="rotate(26, -1, 454)"/>
    <rect x="811" y="46" width="75" height="75" rx="8" fill="#dc2626" opacity="0.04" transform="rotate(21, 382, 514)"/>
    <rect x="1141" y="25" width="34" height="69" rx="8" fill="#dc2626" opacity="0.14" transform="rotate(32, 283, 223)"/>
    <rect x="1264" y="154" width="82" height="83" rx="8" fill="#dc2626" opacity="0.04" transform="rotate(12, 1294, 444)"/>
    <rect x="264" y="421" width="98" height="23" rx="8" fill="#dc2626" opacity="0.15" transform="rotate(4, 450, 56)"/>
    <polygon points="117,659 185,795 49,795" fill="#b91c1c" opacity="0.07"/>
    <polygon points="-22,440 27,538 -71,538" fill="#b91c1c" opacity="0.07"/>
    <polygon points="600,151 688,327 512,327" fill="#b91c1c" opacity="0.09"/>
    <polygon points="52,65 101,163 3,163" fill="#b91c1c" opacity="0.06"/>

  <!-- Wave at bottom -->
  <path d="M0,532 C360,581 840,483 1200,532 L1200,630 L0,630Z" fill="#b91c1c" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    PBN 빌더
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마포 — LLM비교
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#fbbf24" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    마포 PBN 빌더 — LLM비교
  </text>
</svg>